
spring:
  application:
    name: backend.config-service
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config-repo

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health,info,env

logging:
  level:
    root: INFO
    org.springframework.cloud.config: DEBUG
    org.springframework.web: DEBUG
